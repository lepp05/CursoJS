<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body{
            background-color: brown;
            color: aqua;
        }
    </style>
</head>
<body>
    <h1>primeiros passos com o DOM</h1>
    <p>aqui vai o resultado</p>
    <p>aprendendo a usar o <strong>DOM</strong></p>
    <div id = "msg">clique em mim</div>

    <script>
        var p1 = window.document.getElementsByTagName('p')[0]
        document.write('esta escrito assim ; '+ p1.innerText) 
        p1.style.color = 'blue'
        var d = window.document.querySelector('div#msg') // se for id se usa "#", se for class se usa "."
        d.style.background ='blue'

    </script>
</body>
</html>
