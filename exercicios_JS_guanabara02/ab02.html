<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>

    </header>
    <section>
        <div id="dados">
            <p>Início: <input type="number" name="" id="txti"></p>
            <p>Fim: <input type="number" name="" id="txtf"></p>
            <p>Passo: <input type="number" name="" id="txtp"></p>
            <p><input type="button" value="contar" onclick="contar()"></p>
        </div>
        <div id="res">
            Preparando a contagem..
        </div>
    </section>
    <footer>
        <p>&copy;Lepp</p>
    </footer>

    <script>
        function contar(){
            let ini = document.getElementById('txti')
            let fim = document.getElementById('txtf')
            let passo = document.getElementById('txtp')
            let res = document.getElementById('res')

            //validação caso o usuário nao digite todos os dados
            if (ini.value.length == 0 || fim.value.length == 0 || passo.value.length == 0){
                alert('Faltam dados')
            } else {
                res.innerHTML = 'Contando..'
                let i = Number(ini.value)
                let f = Number(fim.value)
                let p = Number(passo.value)
                if(p <= 0){
                    alert('impossivel contar')
                }

                /*a variável 'contador' vai receber i{numeroInicial},
                e enquanto ele for menor que que o f{numeroFinal},
                ele vai se auto adicionar o p{quantidade de passos/pulos}*/
                if(i<f){
                    //contagem crescente
                    for(let c = i ; c<= f ; c += p){
                    res.innerHTML += `${c}, `
                }
            }else{
                //contagem regressiva
                for(let c = i; c >= f; c -= p){
                    res.innerHTML += `${c} `
                }
            }
                
            }
        }
    </script>
</body>
</html>
