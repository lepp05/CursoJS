<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabuada</title>
</head>
<body>
    <input type="number" name="numero" id="num" placeholder="digite um numero">
    <input type="button" value="Calcular" onclick="calcular()">
    <div id="res"></div>
    <script>
        function calcular(){
            const num = document.getElementById('num').value
            let res = document.getElementById('res')
            res.innerHTML = ''
            for(let m = 1;m <= 10;m++){
                const r = num*m
                res.innerHTML += `${num} vezes ${m} é ${r}<br>`
            }
        }
    </script>
</body>
</html>
