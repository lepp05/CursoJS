<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabuada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>
    <section>
        <div>
            <p>Número: <input type="number" name="txtn" id="txtn">
            <input type="button" value="Gerar Tabuada" onclick="tabuada()"></p>
            
        </div>
        <div>
            <select name="tabuada" id="seltab" size="10">
                <option value=""> Digite um numero acima</option>
            </select>
        </div>
    </section>
    <script>
        function tabuada(){
            let num = document.getElementById('txtn')
            let tab = document.getElementById('seltab')
            if(num.value.length == 0){
                alert('Digite um número.')
            } else {
                let n = Number(num.value)
                
                tab.innerHTML= ''
                
                for (let c = 1;c <= 10; c++){
                    let item = document.createElement('option')//Cria um elemento <option> na memória.
                    item.text = `${n} x ${c} = ${n*c}`
                    tab.appendChild(item) //Insere cada <option> dentro do <select>.

                }

            } 
        }
    </script>
</body>
</html>
